# Continuous Integration — the quality gate in front of deployment.
# Runs on every push/PR to main. Render (backend + agent) and Vercel (frontend)
# auto-deploy on push; this workflow is what catches breakage *before* that.
# See docs/DEPLOYMENT.md §7 for the reasoning behind each step.
#
# Note: CI deliberately holds NO production secrets — none of these jobs talk to
# Atlas, Google, or Gemini, so nothing sensitive ever reaches the runner or its logs.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ---- Backend: typecheck + the Vitest/Supertest suite (~30 tests, no DB needed) ----
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # Node 24 (current LTS) ships npm 11 — avoids the npm 10.8.2 "Exit handler
          # never called!" crash/hang and gets off the now-EOL Node 20.
          node-version: "24"
          cache: npm
          cache-dependency-path: backend/package-lock.json
      # --include=dev forces devDependencies (tsc, @types/*) even if a runner sets
      # NODE_ENV=production — without them you get "implicitly has an 'any' type" errors.
      - run: npm ci --include=dev
      - run: npm run typecheck # tsc --noEmit
      - run: npm test          # Vitest + Supertest

  # ---- Frontend: typecheck + production build ----
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # Node 24 (current LTS) ships npm 11 — avoids the npm 10.8.2 "Exit handler
          # never called!" crash/hang and gets off the now-EOL Node 20.
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci --include=dev   # devDeps (tsc, vite, @types/*) are required to build
      - run: npm run build     # tsc -b && vite build
        env:
          # Build-time placeholders only — real values are set in Vercel.
          VITE_GOOGLE_CLIENT_ID: "ci-placeholder"
          VITE_API_BASE: ""

  # ---- Agent: install deps + import-time smoke test (config/wiring loads) ----
  agent:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - run: pip install --upgrade pip
      - run: pip install -r requirements.txt
      - run: python -c "import app.main"  # fails fast on broken imports/config
