# Render Blueprint — deploys the backend and agent-service.
# (Frontend deploys separately on Vercel — see frontend/vercel.json.)
#
# Usage: Render Dashboard → New → Blueprint → point at this repo.
# Only the `sync: false` keys need manual entry in the dashboard (real secrets):
#   backend: CLIENT_ORIGINS, MONGO_URI, ADMIN_EMAILS, GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET
#   agent:   GOOGLE_API_KEY, MONGO_URI
# Everything else (service URLs, INTERNAL_API_KEY sharing) is wired automatically.
#
# There is NO vector-store service: RAG vectors live in MongoDB Atlas
# (Atlas Vector Search), the same DB used for everything else.

services:
  # ---------------- Backend (Node + Express) ----------------
  - type: web
    name: portfolio-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: COOKIE_SECURE
        value: "true"
      - key: COOKIE_DOMAIN
        value: ""
      # ---- Secrets: enter once in the Render dashboard (never committed) ----
      - key: CLIENT_ORIGINS          # your Vercel URL, e.g. https://your-app.vercel.app
        sync: false
      - key: MONGO_URI               # Atlas connection string
        sync: false
      - key: ADMIN_EMAILS            # Gmail(s) allowed to sign in
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      # ---- Non-secrets: committed so no dashboard entry is needed ----
      - key: MONGO_DB
        value: portfolio
      - key: JWT_SECRET
        generateValue: true
      # Generated here and shared to the agent via fromService (see below).
      - key: INTERNAL_API_KEY
        generateValue: true
      - key: AGENT_SERVICE_URL
        value: https://portfolio-agent-r09k.onrender.com
      - key: PUBLIC_BASE_URL
        value: https://portfolio-backend-7ocw.onrender.com

  # ---------------- Agent service (Python + FastAPI) ----------------
  - type: web
    name: portfolio-agent
    runtime: docker
    rootDir: agent-service
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    plan: free
    envVars:
      - key: PORT
        value: 8001
      # The backend is the only caller (server-to-server). Non-secret — committed.
      - key: ALLOWED_ORIGINS
        value: https://portfolio-backend-7ocw.onrender.com
      # ---- Secret: enter once in the Render dashboard ----
      - key: GOOGLE_API_KEY          # Gemini API key
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: GEMINI_MODELS
        value: gemini-2.5-flash,gemini-flash-latest,gemini-2.0-flash
      - key: GEMINI_EMBED_MODEL
        value: models/gemini-embedding-001
      - key: MONGO_URI               # same Atlas string as the backend
        sync: false
      - key: MONGO_DB
        value: portfolio
      # Vectors live in MongoDB Atlas (Atlas Vector Search) — no separate service.
      - key: VECTOR_COLLECTION
        value: portfolio_vectors
      - key: EMBED_DIMS
        value: 3072
      # Auto-synced from the backend's generated INTERNAL_API_KEY — no manual copy.
      - key: INTERNAL_API_KEY
        fromService:
          type: web
          name: portfolio-backend
          envVarKey: INTERNAL_API_KEY
